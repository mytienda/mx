document.addEventListener("DOMContentLoaded", () => {
  const elementos = document.querySelectorAll(".observado");
  const animando = new Set();
  const yaAnimado = new WeakMap();
  const timeoutLimpieza = new WeakMap();

  elementos.forEach(el => {
    const anims = [...el.classList].filter(c =>
      c.startsWith("animate__") && c !== "animate__animated"
    );
    el.dataset.animations = anims.join(" ");
    el.classList.remove("animate__animated", ...anims);
  });

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const el = entry.target;
      const anims = el.dataset.animations.split(" ").filter(Boolean);
      const tieneControl = el.dataset.control === 'true';

      if (entry.isIntersecting) {
        if (animando.has(el) || yaAnimado.get(el) === 'animando') return;

        if (timeoutLimpieza.has(el)) {
          clearTimeout(timeoutLimpieza.get(el));
          timeoutLimpieza.delete(el);
        }

        animando.add(el);
        yaAnimado.set(el, 'animando');
        
        if (tieneControl) {
          el.style.opacity = '1';
          el.style.transform = 'none';
        }
        
        el.classList.add("animate__animated", ...anims);
        
        const limpiar = () => {
          if (timeoutLimpieza.has(el)) {
            clearTimeout(timeoutLimpieza.get(el));
            timeoutLimpieza.delete(el);
          }
          
          animando.delete(el);
          yaAnimado.set(el, false); // 🔥 false en vez de dejar 'animando'
          el.classList.remove("animate__animated", ...anims);
          
          if (tieneControl) {
            el.style.opacity = '0';
          } else {
            el.style.transform = 'none';
            el.style.opacity = '1';
          }
        };
        
        const timeout = setTimeout(() => limpiar(), 2500);
        timeoutLimpieza.set(el, timeout);
        
        el.addEventListener("animationend", () => limpiar(), { once: true });

      } else {
        if (animando.has(el)) return;
        
        yaAnimado.set(el, false);
        el.classList.remove("animate__animated", ...anims);
        
        if (tieneControl) {
          el.style.transform = 'none';
          el.style.opacity = '0';
        } else {
          el.style.transform = 'none';
          el.style.opacity = '1';
        }
      }
    });
  }, {
    threshold: 0.05,
    rootMargin: "50px"
  });

  elementos.forEach(el => observer.observe(el));
});

function controlWhatsAppButton() {
    const whatsappButton = document.querySelector('.whatsapp-float');
    const content = document.querySelector('.content');
    
    if (!whatsappButton || !content) return;
    
    function updateButtonPosition() {
        const contentRect = content.getBoundingClientRect();
        const windowWidth = window.innerWidth;
        const buttonWidth = 80;
        const margin = 40;
        
        // Si la pantalla es muy pequeña, ajustar márgenes
        const adjustedMargin = windowWidth < 400 ? 20 : margin;
        
        // Calcular la posición izquierda del contenedor más el margen
        let leftPosition = contentRect.left + adjustedMargin;
        
        // Asegurar que el botón no se salga del contenedor ni de la pantalla
        const maxLeft = Math.min(
            contentRect.right - buttonWidth - adjustedMargin,
            windowWidth - buttonWidth - 10
        );
        const minLeft = Math.max(contentRect.left + adjustedMargin, 10);
        
        const finalLeft = Math.min(Math.max(leftPosition, minLeft), maxLeft);
        
        whatsappButton.style.left = finalLeft + 'px';
        whatsappButton.style.transform = 'none';
        whatsappButton.style.marginLeft = '0';
    }
    
    // Actualizar posición en scroll y resize con debounce
    let resizeTimeout;
    function handleResize() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(updateButtonPosition, 100);
    }
    
    window.addEventListener('scroll', updateButtonPosition);
    window.addEventListener('resize', handleResize);
    
    // Posición inicial con delay para asegurar que el DOM esté listo
    setTimeout(updateButtonPosition, 100);
}

function createStarEffect(x, y) {
    const star = document.createElement('div');
    star.className = 'star-animation';
    star.style.left = x + 'px';
    star.style.top = y + 'px';
    star.style.width = '20px';
    star.style.height = '20px';
    
    document.body.appendChild(star);
    
    setTimeout(() => {
        star.remove();
    }, 5500);
}


function initializeEventHandlers() {
    // Ejemplo de evento para crear efecto de estrella al hacer clic
    document.addEventListener('click', function(event) {
        if (event.target.classList.contains('centered-image')) {
            createStarEffect(event.clientX, event.clientY);
        }
    });
}


document.addEventListener('DOMContentLoaded', function() {
    initializeEventHandlers();
    controlWhatsAppButton(); // Añadido para controlar el botón de WhatsApp
});
